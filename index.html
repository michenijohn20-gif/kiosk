<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS Upgrade</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        padding-bottom: 220px;
      }

      .floating-btn {
        position: fixed;
        right: 15px;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #summaryBtn {
        bottom: 90px;
      }

      #clearBtn {
        bottom: 160px;
      }
    </style>
  </head>

  <body class="bg-light">
    <!-- NAVBAR -->
    <nav class="navbar bg-dark navbar-dark sticky-top">
      <div class="container-fluid">
        <span class="navbar-brand">Mini POS</span>

        <span class="badge bg-primary" id="total-items-count">
          0 Products
        </span>
      </div>
    </nav>

    <!-- FLOATING BUTTONS -->
    <button
      id="summaryBtn"
      onclick="showSummary()"
      class="btn btn-primary floating-btn"
    >
      📊
    </button>

    <button
      id="clearBtn"
      onclick="clearCart()"
      class="btn btn-danger floating-btn"
    >
      🗑
    </button>

    <!-- SEARCH -->
    <div class="container mt-3">
      <input
        class="form-control"
        id="searchInput"
        placeholder="Search product..."
        oninput="handleSearch()"
      />
    </div>

    <!-- PRODUCTS -->
    <div class="container mt-3">
      <div class="row g-3" id="inventory-grid">
        <div id="loading-state" class="text-center py-4">Loading...</div>
      </div>
    </div>

    <!-- CART -->
    <div class="container mt-4">
      <h6 class="mb-2">Cart Items</h6>
      <ul class="list-group" id="cart-list"></ul>
    </div>

    <!-- BOTTOM BAR -->
    <div class="fixed-bottom bg-white border-top p-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div>
          <b>Total: <span id="cart-total-price">0</span> KES</b><br />
          <small id="cart-summary">0 items</small>
        </div>
      </div>

      <div class="btn-group w-100 mb-2">
        <input type="radio" name="payment" value="Cash" id="cash" checked />
        <label class="btn btn-outline-secondary" for="cash">Cash</label>

        <input type="radio" name="payment" value="M-Pesa" id="mpesa" />
        <label class="btn btn-outline-success" for="mpesa">M-Pesa</label>
      </div>

      <button class="btn btn-primary w-100" onclick="checkout()">
        Checkout
      </button>
    </div>

    <div class="modal fade" id="summaryModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-dark text-white">
            <h5 class="modal-title">Daily Summary</h5>
            <button
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <div class="row text-center mb-3">
              <div class="col">
                <h4 id="stat-cash">0</h4>
                <small>Cash</small>
              </div>

              <div class="col">
                <h4 id="stat-mpesa">0</h4>
                <small>M-Pesa</small>
              </div>
            </div>

            <h5>Total: <span id="stat-total">0</span> KES</h5>
            <small id="stat-count">0 sales</small>

            <hr />

            <h6>Low Stock</h6>
            <ul class="list-group" id="low-stock-list"></ul>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
