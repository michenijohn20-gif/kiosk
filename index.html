<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POS Upgrade</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body { padding-bottom: 220px; }
  </style>
</head>

<body class="bg-light">

<nav class="navbar bg-dark navbar-dark sticky-top">
  <div class="container-fluid">
    <span class="navbar-brand">Mini POS</span>
    <span class="badge bg-primary" id="total-items-count">0 Products</span>
  </div>
</nav>

<!-- SEARCH -->
<div class="container mt-3">
  <input class="form-control" id="searchInput"
    placeholder="Search..."
    oninput="handleSearch()"/>
</div>

<!-- PRODUCTS -->
<div class="container mt-3">
  <div class="row" id="inventory-grid">
    <div id="loading-state" class="text-center py-4">
      Loading...
    </div>
  </div>
</div>

<!-- CART -->
<div class="container mt-4">
  <h6>Cart</h6>
  <ul class="list-group" id="cart-list"></ul>
</div>

<!-- BOTTOM BAR -->
<div class="fixed-bottom bg-white border-top p-3">
  <div class="d-flex justify-content-between">
    <div>
      <b>Total: <span id="cart-total-price">0</span></b><br/>
      <small id="cart-summary">0 items</small>
    </div>

    <button class="btn btn-danger btn-sm" onclick="clearCart()">Clear</button>
  </div>

  <div class="btn-group w-100 mt-2">
    <input type="radio" name="payment" value="Cash" id="cash" checked>
    <label class="btn btn-outline-secondary" for="cash">Cash</label>

    <input type="radio" name="payment" value="M-Pesa" id="mpesa">
    <label class="btn btn-outline-success" for="mpesa">M-Pesa</label>
  </div>

  <button class="btn btn-primary w-100 mt-2" onclick="checkout()">
    Checkout
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
